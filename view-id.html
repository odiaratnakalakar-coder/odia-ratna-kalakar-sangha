<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Verification</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

.card{
    max-width:500px;
    margin:auto;
    background:#fff;
    border:2px solid #b30000;
    border-radius:12px;
    padding:20px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

h2{
    color:#b30000;
    text-align:center;
}

.photo{
    display:block;
    width:140px;
    height:170px;
    object-fit:cover;
    margin:15px auto;
    border:3px solid #b30000;
    border-radius:10px;
}

table{
    width:100%;
    border-collapse:collapse;
}

td{
    padding:8px;
    border-bottom:1px solid #ddd;
}

td:first-child{
    font-weight:bold;
    color:#b30000;
    width:120px;
}
  .status{
    margin-top:20px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

.valid{
    color:green;
}

.invalid{
    color:red;
}
</style>
</head>

<body>

<div class="card">

<h2>Member Verification</h2>

<img id="photo" class="photo" src="">

<table>
<tr>
<td>Member ID</td>
<td id="memberId"></td>
</tr>

<tr>
<td>ନାମ</td>
<td id="name"></td>
</tr>

<tr>
<td>ପିତାଙ୍କ ନାମ</td>
<td id="father"></td>
</tr>

<tr>
<td>ମୋବାଇଲ</td>
<td id="mobile"></td>
</tr>

<tr>
<td>ଠିକଣା</td>
<td id="address"></td>
</tr>
</table>

<div id="status" class="status"></div>

</div>

<script type="module">
import { db } from "./firebase.js";
import { doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");
  if(id){

    const snap = await getDoc(doc(db,"members",id));

    if(snap.exists()){

        const data = snap.data();

        document.getElementById("memberId").textContent = data.memberId || "";
        document.getElementById("name").textContent = data.name || "";
        document.getElementById("father").textContent = data.father || "";
        document.getElementById("mobile").textContent = data.mobile || "";
        document.getElementById("address").textContent = data.address || "";

        if(data.photoUrl){
            document.getElementById("photo").src = data.photoUrl;
        }

        document.getElementById("status").innerHTML =
        "<span class='valid'>✅ Verified Member</span>";

    }else{

        document.getElementById("status").innerHTML =
        "<span class='invalid'>❌ Member Not Found</span>";

    }

}else{

    document.getElementById("status").innerHTML =
    "<span class='invalid'>❌ Invalid Member ID</span>";

    }
  </script>

</body>
</html>
