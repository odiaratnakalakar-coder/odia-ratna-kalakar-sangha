<!DOCTYPE html>
<html lang="or">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Donation Admin</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:#fff;
padding:15px;
}

.container{
max-width:600px;
margin:auto;
}

h1{
text-align:center;
color:#ff9800;
margin-bottom:20px;
}

.summary{
background:#222;
border:2px solid #ff9800;
border-radius:12px;
padding:20px;
text-align:center;
margin-bottom:20px;
}

.summary h2{
font-size:30px;
color:#ffcc00;
margin-bottom:8px;
}

.summary p{
font-size:16px;
}

.card{
background:#222;
border:2px solid #ff9800;
border-radius:12px;
padding:15px;
margin-bottom:15px;
}

.card h3{
color:#ffcc00;
margin-bottom:10px;
}

.card p{
margin:6px 0;
font-size:16px;
}

button{
padding:10px 15px;
border:none;
border-radius:6px;
cursor:pointer;
color:#fff;
font-size:15px;
margin:5px;
}

.editBtn{
background:#2196F3;
}

.deleteBtn{
background:#c40000;
}

</style>

</head>

<body>

<div class="container">

<h1>❤️ Donation Admin</h1>

<div class="summary">

<h2 id="totalAmount">₹0</h2>

<p>Total Donation Amount</p>

</div>

<div id="donationList"></div>
<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs,
updateDoc,
deleteDoc,
doc,
query,
orderBy
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const donationList = document.getElementById("donationList");
const totalAmount = document.getElementById("totalAmount");

async function loadDonations(){

donationList.innerHTML="";
let total=0;

const q=query(
collection(db,"donations"),
orderBy("createdAt","desc")
);

const snapshot=await getDocs(q);

snapshot.forEach((item)=>{

const data=item.data();

total += Number(data.amount || 0);

donationList.innerHTML += `

<div class="card">

<h3>${data.name}</h3>

<p>📱 ${data.mobile}</p>

<p>💰 ₹${data.amount}</p>

<p>📝 ${data.purpose || "-"}</p>

<button class="editBtn"
onclick="editDonation(
'${item.id}',
'${data.name}',
'${data.mobile}',
'${data.amount}',
'${data.purpose || ""}'
)">
✏️ Edit
</button>

<button class="deleteBtn"
onclick="deleteDonation('${item.id}')">
🗑️ Delete
</button>

</div>

`;

});

totalAmount.textContent="₹"+total;

}

window.editDonation=async function(id,name,mobile,amount,purpose){

const newName=prompt("ନୂଆ ନାମ",name);
const newMobile=prompt("ନୂଆ ମୋବାଇଲ୍",mobile);
const newAmount=prompt("ନୂଆ ରାଶି",amount);
const newPurpose=prompt("ନୂଆ ଉଦ୍ଦେଶ୍ୟ",purpose);

if(!newName || !newMobile || !newAmount) return;

await updateDoc(doc(db,"donations",id),{
name:newName,
mobile:newMobile,
amount:Number(newAmount),
purpose:newPurpose
});

alert("✅ Donation Updated");

loadDonations();

}

window.deleteDonation=async function(id){

const password=prompt("🔒 Delete Password");

if(password!=="2026@"){
alert("❌ ଭୁଲ Password");
return;
}

if(!confirm("ଏହି Donation କୁ Delete କରିବେ?")) return;

await deleteDoc(doc(db,"donations",id));

alert("✅ Donation Deleted");

loadDonations();

}

loadDonations();

</script>

</body>
</html>
