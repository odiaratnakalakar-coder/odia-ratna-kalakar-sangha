<script type="module">
import { db } from "./firebase.js";

import {
  collection,
  addDoc,
  doc,
  getDoc,
  setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

async function getNextMemberId() {
  const counterRef = doc(db, "system", "counter");
  const counterSnap = await getDoc(counterRef);

  let number = 1;

  if (counterSnap.exists()) {
    number = counterSnap.data().lastNumber + 1;
  }

  await setDoc(counterRef, {
    lastNumber: number
  });

  return "ORKS" + String(number).padStart(4, "0");
}

document.getElementById("registrationForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  try {

    const memberId = await getNextMemberId();

    const photo = document.getElementById("photo").files[0];

    let photoUrl = "";

    if (photo) {
      const formData = new FormData();
      formData.append("file", photo);
      formData.append("upload_preset", "odiaratan2026");

      const response = await fetch(
        "https://api.cloudinary.com/v1_1/y8toswrt/image/upload",
        {
          method: "POST",
          body: formData
        }
      );

      const result = await response.json();
      photoUrl = result.secure_url;
    }    const docRef = await addDoc(collection(db, "members"), {
      memberId: memberId,
      photoUrl: photoUrl,
      name: document.getElementById("name").value,
      father: document.getElementById("father").value,
      mobile: document.getElementById("mobile").value,
      address: document.getElementById("address").value,
      createdAt: new Date()
    });

    alert("Registration Successful!");

    location.assign("idcard.html?id=" + docRef.id);

  } catch (error) {
    alert("Error: " + error.message);
    console.error(error);
  }
