<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ସଦସ୍ୟ ପଞ୍ଜୀକରଣ</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

<img src="logo.png" class="logo" alt="Logo">

<h2>ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ</h2>

<form id="registrationForm">

<label>ପୂର୍ଣ୍ଣ ନାମ</label>
<input type="text" id="name" required>

<label>ପିତାଙ୍କ ନାମ</label>
<input type="text" id="father" required>

<label>ମୋବାଇଲ୍ ନମ୍ବର</label>
<input type="tel" id="mobile" required>

<label>ଠିକଣା</label>
<textarea id="address" rows="3" required></textarea>

<label>ପାସପୋର୍ଟ ସାଇଜ ଫଟୋ</label>
<input type="file" id="photo" accept="image/*">

<button type="submit">
ସଦସ୍ୟ ପଞ୍ଜୀକରଣ
</button>

</form>

</div>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
addDoc,
doc,
getDoc,
setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  async function getNextMemberId() {

  const counterRef = doc(db, "system", "counter");
  const counterSnap = await getDoc(counterRef);

  let number = 1;

  if (counterSnap.exists()) {
    number = counterSnap.data().lastNumber + 1;
  }

  await setDoc(counterRef, {
    lastNumber: number
  });

  return "ORKS" + String(number).padStart(4, "0");
}

document.getElementById("registrationForm").addEventListener("submit", async (e) => {

  e.preventDefault();

  try {

    const memberId = await getNextMemberId();

    const docRef = await addDoc(collection(db, "members"), {
      memberId: memberId,
      name: document.getElementById("name").value,
      father: document.getElementById("father").value,
      mobile: document.getElementById("mobile").value,
      address: document.getElementById("address").value,
      createdAt: new Date()
    });

    alert("Registration Successful");

    location.assign("idcard.html?id=" + docRef.id);

  } catch (error) {
    alert("Error: " + error.message);
    console.error(error);
  }

});

</script>

</body>
</html>
