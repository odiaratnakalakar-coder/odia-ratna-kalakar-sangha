<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ସଦସ୍ୟ ପଞ୍ଜୀକରଣ</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="form-box">
<h2>📝 ସଦସ୍ୟ ପଞ୍ଜୀକରଣ</h2>

<form id="registrationForm">

<label>ପୂର୍ଣ୍ଣ ନାମ</label>
<input id="name" type="text" placeholder="ପୂର୍ଣ୍ଣ ନାମ">

<label>ପିତାଙ୍କ ନାମ</label>
<input type="text" placeholder="ପିତାଙ୍କ ନାମ">

<label>ଲିଙ୍ଗ</label>
<select>
<option>ପୁରୁଷ</option>
<option>ମହିଳା</option>
</select>

<label>ଜନ୍ମ ତାରିଖ</label>
<input type="date">

<label>ମୋବାଇଲ୍ ନମ୍ବର</label>
<input type="tel">

<label>ସ୍ଥାୟୀ ଠିକଣା</label>
<textarea></textarea>

<label>ବର୍ତ୍ତମାନର ଠିକଣା</label>
<textarea></textarea>

<label>ବ୍ଲଡ୍ ଗ୍ରୁପ୍</label>
<select>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

<label>ଜରୁରୀକାଳୀନ ସମ୍ପର୍କ ନମ୍ବର</label>
<input type="tel">

<label>ସଦସ୍ୟଙ୍କ ଫଟୋ</label>
<input type="file" accept="image/*">

<label>ଆଧାର କାର୍ଡ ଫଟୋ</label>
<input type="file" accept="image/*">

<br><br>

<button type="submit">Submit</button>

</form>

</div>
<script type="module">
  getFirestore,
  collection,
  addDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
 
import { getStorage } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuVQISkaKjflN7qQNy35hW7VVWIb-AL2Y",
  authDomain: "odia-ratna-kalakar-sangha.firebaseapp.com",
  projectId: "odia-ratna-kalakar-sangha",
  storageBucket: "odia-ratna-kalakar-sangha.firebasestorage.app",
  messagingSenderId: "462765943345",
  appId: "1:462765943345:web:167b7dd0eaba5786830310",
  measurementId: "G-CKSBB2XCZB"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
document.getElementById("registrationForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  try {
    await addDoc(collection(db, "members"), {
      name: document.getElementById("name").value,
      father: document.getElementById("father").value,
      mobile: document.getElementById("mobile").value,
      address: document.getElementById("address").value,
      createdAt: new Date()
    });

    alert("Registration Successful!");
    document.getElementById("registrationForm").reset();

  } catch (err) {
    alert("Error: " + err.message);
  }
});

</script>
</body>
</html>
