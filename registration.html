<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ସଦସ୍ୟ ପଞ୍ଜୀକରଣ</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
padding:20px;
}

.container{
max-width:500px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#b30000;
}

input,select,textarea{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#b30000;
color:white;
border:none;
border-radius:5px;
font-size:18px;
cursor:pointer;
}

button:hover{
background:#800000;
}
</style>

</head>

<body>

<div class="container">

<h2>📝 ସଦସ୍ୟ ପଞ୍ଜୀକରଣ</h2>

<form>

<input type="text" placeholder="ପୂର୍ଣ୍ଣ ନାମ" required>

<input type="text" placeholder="ପିତାଙ୍କ ନାମ" required>

<input type="tel" placeholder="ମୋବାଇଲ୍ ନମ୍ବର" required>

<textarea placeholder="ଠିକଣା"></textarea>

<button type="submit">
Submit
</button>

</form>

</div>

</body>
</html>
