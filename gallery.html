<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

h2{
    text-align:center;
    color:#fff;
    margin-bottom:20px;
}

#gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:12px;
    padding:10px;
}
    
    
    


.card{
    background:#222;
    border:2px solid red;
    border-radius:10px;
    overflow:hidden;
    text-align:center;
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    cursor:pointer;
}

.card h3{
    padding:10px;
    margin:0;
}

#preview{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}

#preview img{
    max-width:95%;
    max-height:95%;
}
</style>

</head>

<body>

<h2>📷 Gallery</h2>

<div id="gallery"></div>

<div id="preview" onclick="this.style.display='none'">
    <img id="previewImg">
</div>

<script type="module">
  import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const gallery = document.getElementById("gallery");

async function loadGallery(){

gallery.innerHTML = "";

const snapshot = await getDocs(collection(db,"Gallery"));

snapshot.forEach((photo)=>{

const data = photo.data();

gallery.innerHTML += `

<div class="card">

<img src="${data.photoUrl}"
onerror="this.src='logo.png'"
onclick="showImage('${data.photoUrl}')">

<h3>${data.title}</h3>

</div>

`;

});

}

window.showImage = function(url){

const preview = document.getElementById("preview");
const img = document.getElementById("previewImg");

img.src = url;
preview.style.display = "flex";

}

document.getElementById("preview").addEventListener("click", function(){

this.style.display = "none";

});




  loadGallery();

</script>

</body>
</html>
