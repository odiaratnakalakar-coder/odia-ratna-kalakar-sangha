<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}

h2{
    text-align:center;
}

#gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:15px;
}

.card{
    background:#222;
    border:2px solid red;
    border-radius:12px;
    overflow:hidden;
    text-align:center;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    cursor:pointer;
}

.card h3{
    margin:0;
    padding:10px;
}

#preview{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
}

#preview img{
    max-width:95%;
    max-height:95%;
}
</style>
</head>

<body>

<h2>📷 Gallery</h2>

<div id="gallery"></div>

<div id="preview">
<img id="previewImg">
</div>

<script>
    const gallery = document.getElementById("gallery");
const videos = [
  "video1.mp4"
];
const photos = [
"photo1.jpg",
"photo2.jpg",
"photo3.jpg",
"photo4.jpg",
"photo5.jpg",
"photo6.jpg",
"photo7.jpg",
"photo8.jpg",
"photo9.jpg",
"photo10.jpg"
];

photos.forEach((file,index)=>{

gallery.innerHTML += `
<div class="card">
<img src="images/${file}"
onerror="this.parentElement.style.display='none'"
onclick="showImage('images/${file}')">

<h3>Photo ${index+1}</h3>
</div>
`;

});
gallery.innerHTML += `
<div class="card">
<iframe
width="100%"
height="180"
src="https://www.youtube.com/embed/7leDC8-J5d4"
title="YouTube video"
frameborder="0"
allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
allowfullscreen>
</iframe>

<h3>🎥 ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ</h3>
</div>
`;

gallery.innerHTML += `
<div class="card">

<video controls width="100%" height="180">
<source src="images/${file}" type="video/mp4">
</video>

<h3>Video ${index+1}</h3>

</div>
`;

});
window.showImage=function(url){

document.getElementById("preview").style.display="flex";
document.getElementById("previewImg").src=url;

}

document.getElementById("preview").onclick = function () {
    this.style.display = "none";
}

</script>

</body>
</html>
