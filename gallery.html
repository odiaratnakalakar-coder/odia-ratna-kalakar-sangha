<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ - Gallery</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:#fff;
padding:15px;
}

h2{
text-align:center;
margin-bottom:20px;
color:#ffcc00;
}

#gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
gap:15px;
}

.card{
background:#222;
border:2px solid #c40000;
border-radius:12px;
overflow:hidden;
box-shadow:0 0 8px rgba(255,0,0,.3);
}

.card img,
.card video{
width:100%;
height:200px;
object-fit:cover;
display:block;
}

.card h3{
padding:10px;
font-size:16px;
text-align:center;
}

#preview{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
z-index:999;
}

#preview img{
max-width:95%;
max-height:95%;
border-radius:10px;
}

</style>

</head>

<body>

<h2>📷 ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ Gallery</h2>

<div id="gallery"></div>

<div id="preview">
<img id="previewImg">
</div>

<script>
    const gallery = document.getElementById("gallery");

const media = [

{type:"image",file:"photo1.jpg",title:"ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ"},
{type:"image",file:"photo2.jpg",title:"ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ"},
{type:"image",file:"photo3.jpg",title:"ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ"},

{type:"video",file:"video1.mp4",title:"ସାଂସ୍କୃତିକ କାର୍ଯ୍ୟକ୍ରମ"}

];

media.forEach(item=>{

if(item.type==="image"){

gallery.innerHTML+=`

<div class="card">

<img
src="images/${item.file}"
onclick="showImage('images/${item.file}')">

<h3>${item.title}</h3>

</div>

`;

}else{

gallery.innerHTML+=`

<div class="card">

<video controls>

<source
src="images/${item.file}"
type="video/mp4">

</video>

<h3>${item.title}</h3>

</div>

`;

}

});

window.showImage=function(url){

document.getElementById("preview").style.display="flex";
document.getElementById("previewImg").src=url;

}

document.getElementById("preview").onclick=function(){

this.style.display="none";

 }
    </script>

</body>
</html>
