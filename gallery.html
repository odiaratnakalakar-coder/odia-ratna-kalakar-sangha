<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
}

h2{
    text-align:center;
}

#gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
    gap:15px;
}

.card{
    background:#222;
    border:2px solid red;
    border-radius:12px;
    overflow:hidden;
    text-align:center;
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
    cursor:pointer;
}

.card h3{
    margin:0;
    padding:10px;
}

#preview{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.9);
    justify-content:center;
    align-items:center;
}

#preview img{
    max-width:95%;
    max-height:95%;
}
</style>
</head>

<body>

<h2>📷 Gallery</h2>

<div id="gallery"></div>

<div id="preview">
<img id="previewImg">
</div>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const gallery = document.getElementById("gallery");

async function loadGallery(){

gallery.innerHTML = "";

const snapshot = await getDocs(collection(db,"Gallery"));

snapshot.forEach((photo)=>{

const data = photo.data();

if(data.youtubeUrl){

const videoId = data.youtubeUrl.split("v=")[1]?.split("&")[0]
|| data.youtubeUrl.split("youtu.be/")[1]?.split("?")[0];

gallery.innerHTML += `
<div class="card">
<iframe
width="100%"
height="180"
src="https://www.youtube.com/embed/${videoId}"
frameborder="0"
allowfullscreen>
</iframe>
<h3>${data.title || "ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ"}</h3>
</div>
`;

}else{

gallery.innerHTML += `
<div class="card">
<img src="${data.photoUrl}"
onclick="showImage('${data.photoUrl}')">
<h3>${data.title || "ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ"}</h3>
</div>
`;

}

});

}

window.showImage=function(url){
document.getElementById("preview").style.display="flex";
document.getElementById("previewImg").src=url;
}

document.getElementById("preview").onclick=function(){
this.style.display="none";
}

loadGallery();

</script>








































    




</body>
</html>
