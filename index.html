Loading Latest News...

<script type="module">
import { db, messaging } from "./firebase.js";
import { getToken } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";
import {
  collection,
  getDocs,
  query,
  orderBy,
  limit
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const notice = document.getElementById("noticeBoard");

async function loadLatestNews() {
  try {
    const q = query(
      collection(db, "news"),
      orderBy("createdAt", "desc"),
      limit(1)
    );

    const snapshot = await getDocs(q);

    if (snapshot.empty) {
      notice.textContent = "📢 କୌଣସି News ନାହିଁ";
      return;
    }

    snapshot.forEach(doc => {
      const news = doc.data();
      notice.textContent = `${news.title} - ${news.details}`;
    });

  } catch (e) {
    notice.textContent = "News Load Error";
    console.error(e);
  }
}


loadLatestNews();

});</script>
