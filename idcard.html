Coming<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ସଦସ୍ୟ ପଞ୍ଜୀକରଣ</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="form-box">
<h2>📝 ସଦସ୍ୟ ପଞ୍ଜୀକରଣ</h2>

<form>

<label>ପୂର୍ଣ୍ଣ ନାମ</label>
<input type="text" placeholder="ପୂର୍ଣ୍ଣ ନାମ">

<label>ପିତାଙ୍କ ନାମ</label>
<input type="text" placeholder="ପିତାଙ୍କ ନାମ">

<label>ଲିଙ୍ଗ</label>
<select>
<option>ପୁରୁଷ</option>
<option>ମହିଳା</option>
</select>

<label>ଜନ୍ମ ତାରିଖ</label>
<input type="date">

<label>ମୋବାଇଲ୍ ନମ୍ବର</label>
<input type="tel">

<label>ସ୍ଥାୟୀ ଠିକଣା</label>
<textarea></textarea>

<label>ବର୍ତ୍ତମାନର ଠିକଣା</label>
<textarea></textarea>

<label>ବ୍ଲଡ୍ ଗ୍ରୁପ୍</label>
<select>
<option>A+</option>
<option>A-</option>
<option>B+</option>
<option>B-</option>
<option>AB+</option>
<option>AB-</option>
<option>O+</option>
<option>O-</option>
</select>

<label>ଜରୁରୀକାଳୀନ ସମ୍ପର୍କ ନମ୍ବର</label>
<input type="tel">

<label>ସଦସ୍ୟଙ୍କ ଫଟୋ</label>
<input type="file" accept="image/*">

<label>ଆଧାର କାର୍ଡ ଫଟୋ</label>
<input type="file" accept="image/*">

<br><br>

<button type="submit">Submit</button>

</form>

</div>

</body>
</html> Soon
