<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ସଦସ୍ୟ ପରିଚୟ ପତ୍ର</title>

<style>
body{
margin:0;
padding:20px;
background:#f0f0f0;
font-family:Arial,sans-serif;
}

.card{
width:350px;
margin:auto;
background:#fff;
border:3px solid #b30000;
border-radius:15px;
padding:20px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

.logo{
width:80px;
height:80px;
border-radius:50%;
}

h2{
color:#b30000;
margin:10px 0;
}

.photo{
width:100px;
height:120px;
border:1px solid #999;
margin:15px auto;
background:#eee;
}

p{
font-size:16px;
margin:8px 0;
text-align:left;
}

button{
width:100%;
padding:12px;
background:#b30000;
color:#fff;
border:none;
border-radius:5px;
font-size:18px;
cursor:pointer;
margin-top:15px;
}
</style>

</head>
<body>

<div class="card">

<img src="logo.png" class="logo">

<h2>ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ</h2>

<img id="photo" class="photo" src="" alt="Photo">

<p><strong>ସଦସ୍ୟ ID:</strong> ORKS0001</p>

<p><strong>ନାମ:</strong> <span id="name"></span></p>

<p><strong>ପିତାଙ୍କ ନାମ:</strong> <span id="father"></span></p>

<p><strong>ମୋବାଇଲ୍:</strong> <span id="mobile"></span></p>

<p><strong>ଠିକଣା:</strong> <span id="address"></span></p>

<button onclick="window.print()">Print ID Card</button>

</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBuVQISkaKjflN7qQNy35hW7VVWIb-AL2Y",
  authDomain: "odia-ratna-kalakar-sangha.firebaseapp.com",
  projectId: "odia-ratna-kalakar-sangha",
  storageBucket: "odia-ratna-kalakar-sangha.firebasestorage.app",
  messagingSenderId: "462765943345",
  appId: "1:462765943345:web:167b7dd0eaba5786830310"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const querySnapshot = await getDocs(collection(db, "members"));

if (!querySnapshot.empty) {
  const data = querySnapshot.docs[0].data();

  document.getElementById("name").textContent = data.name;
  document.getElementById("father").textContent = data.father;
  document.getElementById("mobile").textContent = data.mobile;
  document.getElementById("photo").src = "photos/" + data.memberId + ".jpg";
}
</script>

</body>
</html>
