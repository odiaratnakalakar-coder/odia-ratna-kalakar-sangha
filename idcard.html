<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ସଦସ୍ୟ ID Card</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
display:flex;
justify-content:center;
padding:20px;
}

.card{
    width:350px;
    min-height:220px;
    background:#fff;
    border:3px solid #b30000;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,.25);
}
.header{
    text-align:center;
    background:#fff;
    padding:15px 10px;
    border-bottom:3px solid #b30000;
}

.logo{
    width:80px;
    height:80px;
    object-fit:contain;
}

.header h2{
    color:#b30000;
    font-size:22px;
    margin:8px 0 3px;
    font-weight:bold;
}

.header p{
    color:#003399;
    font-size:16px;
    font-weight:bold;
}
.photo{
    text-align:center;
    margin:15px 0;
}

.photo img{
    width:120px;
    height:150px;
    object-fit:cover;
    border:3px solid #b30000;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
}

    
    
    
























.header p{
font-size:14px;
color:#555;
margin-top:3px;
}

.photo{
text-align:center;
margin:15px 0;
}

.photo img{
width:140px;
height:170px;
border:4px solid #b30000;
border-radius:10px;
object-fit:cover;
}

.details{
    padding:15px 20px;
}

.details p{
    margin:10px 0;
    padding-bottom:6px;
    border-bottom:1px dashed #ddd;
    font-size:15px;
    line-height:1.5;
}

.details strong{
    color:#b30000;
    display:inline-block;
    min-width:95px;
}

.details span{
    color:#222;
    font-weight:600;
}






color:#b30000;
}
  .footer{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    padding:15px 20px;
    border-top:1px dashed #ccc;
}

.sign{
    font-size:12px;
    text-align:center;
    color:#444;
}

.seal{
    width:70px;
    height:70px;
    border:2px dashed #b30000;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#b30000;
    font-size:12px;
    text-align:center;
}





}

.sign{
text-align:center;
font-size:12px;
}

.seal{
width:70px;
height:70px;
border:2px dashed #b30000;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:11px;
color:#b30000;
}

.printBtn{
width:90%;
margin:15px auto;
display:block;
padding:12px;
font-size:18px;
background:#b30000;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
}

@media print{
.printBtn{
display:none;
}
body{
background:#fff;
padding:0;
}
.card{
box-shadow:none;
margin:auto;
}
}

</style>
</head>

<body>

<div class="card">

<div class="header">
    <img src="logo.png" class="logo">

    <h2>ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ</h2>
    <p>ODIA RATNA KALAKAR SANGHA</p>
    <small>Surat, Gujarat</small>
</div>

<div class="photo">
    <img id="photo" src="">
</div>

<div class="details">

    <p><strong>Member ID :</strong>
        <span id="memberId"></span>
    </p>

    <p><strong>ନାମ :</strong>
        <span id="name"></span>
    </p>

    <p><strong>ପିତାଙ୍କ ନାମ :</strong>
        <span id="father"></span>
    </p>

    <p><strong>ମୋବାଇଲ :</strong>
        <span id="mobile"></span>
    </p>

    <p><strong>ଠିକଣା :</strong>
        <span id="address"></span>
    </p>

</div>

<div class="footer">

    <img src="signature.png" style="width:120px;height:auto;"><br>
Authorized Signature
        
    

    <div class="seal">
        Official Seal
    </div>

</div>






























<button class="printBtn" onclick="window.print()">
🖨️ Print ID Card
</button>




<script type="module">

import { db } from "./firebase.js";

import { doc, getDoc }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(id){

const snap = await getDoc(doc(db,"members",id));

if(snap.exists()){

const data = snap.data();

document.getElementById("memberId").textContent = data.memberId || "";
document.getElementById("name").textContent = data.name || "";
document.getElementById("father").textContent = data.father || "";
document.getElementById("mobile").textContent = data.mobile || "";
document.getElementById("address").textContent = data.address || "";

if(data.photoUrl){
document.getElementById("photo").src = data.photoUrl;
}

}else{
alert("Member Not Found");
}

}else{
alert("Invalid ID");
}

</script>

</body>
</html>
