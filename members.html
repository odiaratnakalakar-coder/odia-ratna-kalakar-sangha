<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ସଦସ୍ୟ ତାଲିକା</title>

<link rel="stylesheet" href="style.css">

<style>
.container{
    max-width:900px;
    margin:20px auto;
    padding:20px;
}

h2{
    text-align:center;
    color:#fff;
}

#search{
    width:100%;
    padding:12px;
    margin:15px 0;
    border-radius:8px;
    border:none;
    font-size:16px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

th{
    background:#b30000;
    color:#fff;
}

button{
    background:#b30000;
    color:#fff;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>ସଦସ୍ୟ ତାଲିକା</h2>

<input
type="text"
id="search"
placeholder="ନାମ କିମ୍ବା Member ID ଖୋଜନ୍ତୁ">

<table>

<thead>

<tr>
<th>Member ID</th>
<th>ନାମ</th>
<th>ମୋବାଇଲ୍</th>
<th>ID Card</th>
</tr>

</thead>

<tbody id="memberTable">

</tbody>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const table = document.getElementById("memberTable");
const search = document.getElementById("search");

let members = [];

async function loadMembers(){

const querySnapshot = await getDocs(collection(db,"members"));

members = [];

querySnapshot.forEach((doc)=>{

members.push({
docId: doc.id,
...doc.data()
});

});

showMembers(members);

}

function showMembers(list){

table.innerHTML="";

list.forEach(member=>{

table.innerHTML += `
<tr>

<td>${member.memberId||""}</td>

<td>${member.name||""}</td>

<td>${member.mobile||""}</td>

<td>

<button onclick="window.location='idcard.html?id=${member.docId}'">

View ID

</button>

</td>

</tr>
`;

});

}
