<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>📰 News | ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f5f5f5;
}

header{
    background:#8B0000;
    color:#fff;
    text-align:center;
    padding:15px;
    font-size:24px;
    font-weight:bold;
}

.container{
    width:95%;
    max-width:900px;
    margin:auto;
    padding:15px;
}

.news-card{
    background:#fff;
    border-radius:10px;
    padding:15px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.news-card img{
    width:100%;
    border-radius:8px;
    margin-bottom:10px;
}

.news-date{
    color:#666;
    font-size:14px;
}

.news-title{
    font-size:22px;
    color:#8B0000;
    font-weight:bold;
    margin:10px 0;
}

.news-details{
    font-size:17px;
    line-height:1.7;
}

</style>
</head>

<body>

<header>
📰 ନ୍ୟୁଜ୍ ଏବଂ ସୂଚନା
</header>

<div class="container" id="newsContainer">

</div>
<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  getDocs,
  orderBy,
  query
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

// ପରବର୍ତ୍ତୀ Part ରେ ଏଠାରେ News Load କୋଡ୍ ଆସିବ


const newsContainer = document.getElementById("newsContainer");

async function loadNews() {
  newsContainer.innerHTML = "<p>Loading...</p>";

  try {
    const q = query(collection(db, "news"), orderBy("createdAt", "desc"));
    const snapshot = await getDocs(q);

    newsContainer.innerHTML = "";

    if (snapshot.empty) {
      newsContainer.innerHTML = "<h3>📰 ବର୍ତ୍ତମାନ କୌଣସି News ନାହିଁ</h3>";
      return;
    }

    snapshot.forEach(doc => {
      const news = doc.data();

      newsContainer.innerHTML += `
        <div class="news-card">
          ${news.image ? `<img src="${news.image}" alt="News Image">` : ""}
          <div class="news-date">📅 ${news.date || ""}</div>
          <div class="news-title">${news.title || ""}</div>
          <div class="news-details">${news.details || ""}</div>
        </div>
      `;
    });

  } catch (err) {
    newsContainer.innerHTML =
      "<p style='color:red'>News Load Error: " + err.message + "</p>";
  }
}

loadNews();
</script>
</body>
</html>
