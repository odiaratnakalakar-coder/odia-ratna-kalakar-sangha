<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Committee Admin</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

.container{
    max-width:500px;
    margin:auto;
    background:#222;
    padding:20px;
    border-radius:10px;
}

h2,h3{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#c40000;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.card{
    background:#222;
    border:2px solid red;
    border-radius:12px;
    padding:15px;
    margin-top:15px;
    text-align:center;
}

.card img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid red;
}

.actionBtn{
    width:auto;
    padding:8px 15px;
    margin:5px;
}
</style>
</head>

<body>

<div class="container">

<h2>Committee Admin Panel</h2>

<input id="name" placeholder="Member Name">

<input id="post" placeholder="Post">

<input id="mobile" placeholder="Mobile Number">

<input id="photoUrl" placeholder="Photo URL">

<button id="saveBtn">Save Member</button>

</div>

<h3>Committee Members</h3>

<div id="memberList"></div>
