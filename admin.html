<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Committee Admin</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:20px;
}
.container{
  max-width:500px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
}
input{
  width:100%;
  padding:10px;
  margin:8px 0;
  box-sizing:border-box;
}
button{
  width:100%;
  padding:12px;
  background:#b30000;
  color:white;
  border:none;
  border-radius:5px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h2>Committee Admin Panel</h2>

<input id="name" placeholder="Member Name">

<input id="post" placeholder="Post">

<input id="mobile" placeholder="Mobile">

<input id="photoUrl" placeholder="Photo URL">

<button id="saveBtn">Save Member</button>

</div>
<hr>

<h3>Committee Members</h3>

<div id="memberList"></div>

<script type="module">

import { db } from "./firebase.js";

import {
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const saveBtn = document.getElementById("saveBtn");
const memberList = document.getElementById("memberList");

async function loadMembers() {
  memberList.innerHTML = "";

  const snapshot = await getDocs(collection(db, "Committee"));

  snapshot.forEach((member) => {
    const data = member.data();

    memberList.innerHTML += `
      <div style="background:#fff;padding:10px;margin:10px 0;border-radius:8px;color:#000;">
        <b>${data.name}</b><br>
        ${data.post}<br>
        📞 ${data.mobile}<br><br>

  <button onclick="editMember('${member.id}')">✏ Edit</button>
<button onclick="deleteMember('${member.id}')">🗑 Delete</button>      
        
      </div>
    `;
  });
}
saveBtn.addEventListener("click", async () => { alert("Save button clicked");
  const name = document.getElementById("name").value.trim();
  const post = document.getElementById("post").value.trim();
  const mobile = document.getElementById("mobile").value.trim();
  const photoUrl = document.getElementById("photoUrl").value.trim();

  if (!name || !post || !mobile) {
    alert("ସମସ୍ତ ତଥ୍ୟ ଭରନ୍ତୁ");
    return;
  }

  try {
  await addDoc(collection(db, "Committee"), {
    name,
    post,
    mobile,
    photoUrl
  });

  alert("Saved Successfully");

} catch (e) {
  alert(e.message);
  }
    name,
    post,
    mobile,
    photoUrl
  });

  document.getElementById("name").value = "";
  document.getElementById("post").value = "";
  document.getElementById("mobile").value = "";
  document.getElementById("photoUrl").value = "";

  loadMembers();
});
window.editMember = async function(id) {

  const newName = prompt("New Name:");
  const newPost = prompt("New Post:");
  const newMobile = prompt("New Mobile:");

  if (!newName || !newPost || !newMobile) return;

  await updateDoc(doc(db, "Committee", id), {
    name: newName,
    post: newPost,
    mobile: newMobile
  });

  alert("Member Updated ✅");
  loadMembers();
}
  

window.deleteMember = async function(id) {
  if (!confirm("ଏହି Member କୁ Delete କରିବେ?")) return;

  await deleteDoc(doc(db, "Committee", id));

  alert("Member Deleted ✅");
  loadMembers();
};

loadMembers();
window.deleteMember = async function(id) {
  if (!confirm("ଏହି Member କୁ Delete କରିବେ?")) return;

  await deleteDoc(doc(db, "Committee", id));

  alert("Member Deleted ✅");
  loadMembers();
};

loadMembers();
  </script>
