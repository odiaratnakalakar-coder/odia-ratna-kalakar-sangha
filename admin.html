<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Committee Admin</title>

<style>
body{
  font-family:Arial,sans-serif;
  background:#f5f5f5;
  margin:0;
  padding:20px;
}
.container{
  max-width:500px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
}
input{
  width:100%;
  padding:10px;
  margin:8px 0;
  box-sizing:border-box;
}
button{
  width:100%;
  padding:12px;
  background:#b30000;
  color:white;
  border:none;
  border-radius:5px;
  font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h2>Committee Admin Panel</h2>

<input id="name" placeholder="Member Name">

<input id="post" placeholder="Post">

<input id="mobile" placeholder="Mobile">

<input id="photoUrl" placeholder="Photo URL">

<button id="saveBtn">Save Member</button>

</div>

</body>
</html>
