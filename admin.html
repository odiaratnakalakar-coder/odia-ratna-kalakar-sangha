<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
padding:15px;
}

.container{
max-width:600px;
margin:auto;
}

h1{
text-align:center;
color:#ffcc00;
margin-bottom:20px;
}

.dashboard{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-bottom:25px;
}

.card{
background:#222;
border:2px solid #c40000;
border-radius:12px;
padding:20px;
text-align:center;
box-shadow:0 0 10px rgba(255,0,0,.3);
}

.card h2{
font-size:28px;
margin-bottom:8px;
}

.card p{
font-size:15px;
color:#ddd;
}

.menu{
display:flex;
flex-direction:column;
gap:12px;
}

.menu a{
display:block;
text-decoration:none;
background:#c40000;
color:white;
padding:14px;
border-radius:8px;
text-align:center;
font-size:17px;
font-weight:bold;
transition:.3s;
}

.menu a:hover{
background:#ff0000;
}

.footer{
margin-top:25px;
text-align:center;
font-size:14px;
color:#aaa;
}

</style>
</head>

<body>

<div class="container">

<h1>📊 Admin Dashboard</h1>
<div class="dashboard">

<div class="card">
<h2 id="memberCount">0</h2>
<p>👥 Total Members</p>
</div>

<div class="card">
<h2 id="committeeCount">0</h2>
<p>👨‍💼 Committee Members</p>
</div>

<div class="card">
<h2 id="newsCount">0</h2>
<p>📰 Total News</p>
</div>

<div class="card">
<h2 id="bloodCount">0</h2>
<p>🩸 Blood Donors</p>
</div>

</div>

<div class="menu">

<a href="member-admin.html">👥 Members Admin</a>

<a href="committee-admin.html">👨‍💼 Committee Admin</a>

<a href="news-admin.html">📰 News Admin</a>

<a href="gallery-admin.html">🖼️ Gallery Admin</a>

<a href="idcard.html">🪪 ID Card</a>

<a href="index.html">🏠 Website Home</a>

</div>

<div class="footer">
© 2026 Odia Ratna Kalakar Sangha
</div>
<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

async function loadDashboard(){

// Total Members
const memberSnap = await getDocs(collection(db,"members"));
document.getElementById("memberCount").textContent = memberSnap.size;

// Total Committee
const committeeSnap = await getDocs(collection(db,"Committee"));
document.getElementById("committeeCount").textContent = committeeSnap.size;

// Total News
const newsSnap = await getDocs(collection(db,"news"));
document.getElementById("newsCount").textContent = newsSnap.size;

// Total Blood Donors
try{
const bloodSnap = await getDocs(collection(db,"bloodDonors"));
document.getElementById("bloodCount").textContent = bloodSnap.size;
}catch(e){
document.getElementById("bloodCount").textContent = "0";
}

}

loadDashboard();

</script>

</body>
</html>
