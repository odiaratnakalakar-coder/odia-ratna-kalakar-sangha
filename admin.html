<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Committee Admin</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

.container{
    max-width:500px;
    margin:auto;
    background:#222;
    padding:20px;
    border-radius:10px;
}

h2,h3{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#c40000;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.card{
    background:#222;
    border:2px solid red;
    border-radius:12px;
    padding:15px;
    margin-top:15px;
    text-align:center;
}

.card img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
}

.actionBtn{
    width:auto;
    padding:8px 15px;
    margin:5px;
}

</style>
</head>

<body>

<div class="container">

<h2>Committee Admin Panel</h2>

<input id="name" placeholder="Member Name">

<input id="post" placeholder="Post">

<input id="mobile" placeholder="Mobile Number">

<input type="file" id="photo" accept="image/*">

<button id="saveBtn">
Save Member
</button>

</div>

<h3>Committee Members</h3>

<div id="memberList"></div>

<script type="module">
  import { db, storage } from "./firebase.js";
import {
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";
import {
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const saveBtn = document.getElementById("saveBtn");
const memberList = document.getElementById("memberList");

async function loadMembers() {

  memberList.innerHTML = "";

  const snapshot = await getDocs(collection(db,"Committee"));

  snapshot.forEach((member)=>{

    const data = member.data();

    memberList.innerHTML += `
    <div class="card">

      <img src="${data.photoUrl || 'logo.png'}">

      <h2>${data.name}</h2>

      <p>${data.post}</p>

      <p>📞 ${data.mobile}</p>

      <button class="actionBtn"
      onclick="editMember('${member.id}')">
      ✏ Edit
      </button>

      <button class="actionBtn"
      onclick="deleteMember('${member.id}')">
      🗑 Delete
      </button>

    </div>
    `;

  });

}

saveBtn.addEventListener("click",async()=>{

const name=document.getElementById("name").value.trim();
const post=document.getElementById("post").value.trim();
const mobile=document.getElementById("mobile").value.trim();
const file = document.getElementById("photo").files[0];

let photoUrl = "";

if (file) {
  const storageRef = ref(storage, "committee/" + Date.now() + "_" + file.name);

  await uploadBytes(storageRef, file);

  photoUrl = await getDownloadURL(storageRef);
}

if(!name || !post || !mobile){

alert("ସମସ୍ତ ତଥ୍ୟ ଭରନ୍ତୁ");

return;

}

await addDoc(collection(db,"Committee"),{

name,
post,
mobile,
photoUrl

});

alert("Member Saved Successfully");

document.getElementById("name").value="";
document.getElementById("post").value="";
document.getElementById("mobile").value="";
document.getElementById("photoUrl").value="";

loadMembers();

});
  window.editMember = async function(id){

const newName = prompt("New Name");
const newPost = prompt("New Post");
const newMobile = prompt("New Mobile");

if(!newName || !newPost || !newMobile) return;

await updateDoc(doc(db,"Committee",id),{

name:newName,
post:newPost,
mobile:newMobile

});

alert("Member Updated Successfully");

loadMembers();

}

window.deleteMember = async function(id){

if(!confirm("ଏହି Member କୁ Delete କରିବେ ?")) return;

await deleteDoc(doc(db,"Committee",id));

alert("Member Deleted Successfully");

loadMembers();

}

loadMembers();

</script>

</body>
</html>
