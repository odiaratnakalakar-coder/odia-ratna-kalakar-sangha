<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Committee Members</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#111;
color:#fff;
font-family:Arial,sans-serif;
}

h2{
text-align:center;
color:gold;
padding:20px;
}

.addBtn{
display:block;
margin:15px auto;
padding:12px 20px;
background:#d40000;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.container{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#222;
border:2px solid red;
border-radius:15px;
padding:20px;
text-align:center;
}

.card img{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:4px solid gold;
}

.name{
font-size:24px;
font-weight:bold;
margin-top:10px;
}

.post{
color:gold;
margin:10px 0;
}

.mobile{
margin:10px 0;
}

.btn{
display:inline-block;
padding:10px 18px;
border-radius:8px;
text-decoration:none;
color:#fff;
margin:5px;
font-weight:bold;
}
   </style>
</head>

<body>

<h2>ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ<br>Committee Members</h2>

<button class="addBtn" onclick="adminLogin()">➕ Add Committee Member</button>

<div class="container" id="committeeList"></div>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const list = document.getElementById("committeeList");

const snapshot = await getDocs(collection(db,"Committee"));

const members = [];

snapshot.forEach((doc)=>{
members.push(doc.data());
});

members.sort((a,b)=>{
if((a.post||"").toLowerCase().includes("president")) return -1;
if((b.post||"").toLowerCase().includes("president")) return 1;
return 0;
});

members.forEach((data)=>{

const mobile = data.mobile || "";

list.innerHTML += `
<div class="card">

<img src="${data.photoUrl || 'logo.png'}"
onerror="this.src='logo.png'">

<div class="name">${data.name || ""}</div>

<div class="post">🏅 ${data.post || ""}</div>

<div class="mobile">📞 ${mobile}</div>

<a href="tel:${mobile}" class="btn" style="background:#d40000;">📞 Call</a>

<a href="https://wa.me/91${mobile.replace(/\D/g,'')}" target="_blank" class="btn" style="background:#25D366;">💬 WhatsApp</a>

</div>
`;
});
   window.adminLogin = function(){

const pass = prompt("Admin Password ଦିଅନ୍ତୁ");

if(pass === "12345"){
    window.location.href = "admin.html";
}else{
    alert("Wrong Password!");
}

}

</script>

</body>
</html>
