<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Committee Members</title>

<style>
body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
}
h2{
    text-align:center;
    color:#b30000;
    padding:20px;
}
.container{
    max-width:900px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    padding:20px;
}
.card{
    background:#fff;
    border:2px solid #b30000;
    border-radius:15px;
    text-align:center;
    padding:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}
.card img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    border:3px solid #b30000;
}
.name{
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}
.post{
    color:#b30000;
    font-weight:bold;
    margin:8px 0;
}
.mobile{
    margin:8px 0;
    color:#333;
}
button{
    padding:8px 15px;
    background:#b30000;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ<br>Committee Members</h2>

<div class="container" id="committeeList"></div>

<script type="module">

import { db } from "./firebase.js";

import {
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const list = document.getElementById("committeeList");

const snapshot = await getDocs(collection(db,"Committee"));

snapshot.forEach((doc)=>{

  const data = doc.data();

  list.innerHTML += `
    <div class="card">

      <img src="${data.photoUrl || 'logo.png'}"
           onerror="this.src='logo.png'">

      <div class="name">${data.name || ""}</div>

      <div class="post">${data.post || ""}</div>

      <div class="mobile">
  📞 ${data.mobile ? String(data.mobile) : "No Mobile"}
</div>

<a href="${data.mobile ? `tel:${data.mobile}` : '#'}">
  <button>Call</button>
</a>

      
        <button>Call</button>
      </a>

    </div>
  `;

});

</script>

</body>
</html>
