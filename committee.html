<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Committee Members</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial,sans-serif;
    background:#0f0f0f;
    color:#fff;
}

h2{
    text-align:center;
    color:#ffd700;
    padding:20px;
    font-size:28px;
}

.container{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    padding:20px;
}

.card{
    background:#1a1a1a;
    border:2px solid #d40000;
    border-radius:20px;
    text-align:center;
    padding:20px;
    transition:0.3s;
    box-shadow:0 0 15px rgba(255,0,0,.25);
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 0 25px rgba(255,0,0,.6);
}

.card img{
    width:160px;
    height:160px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid gold;
    margin-bottom:15px;
}

.name{
    font-size:24px;
    font-weight:bold;
}

.post{
    color:#ffd700;
    font-size:18px;
    margin:10px 0;
}

.mobile{
    margin:10px 0;
    font-size:18px;
}

.btn{
    display:inline-block;
    margin:6px;
    padding:10px 18px;
    background:#d40000;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
}
</style>

    


    
    



    
    
    
    
    



    
    
    
    
    



    
    
    
    
    



    
    
    



    
    
    


    
    



    
    
    
    
    
    



</head>
<body>

<h2>ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ<br>Committee Members</h2>


<button onclick="adminLogin()">➕ Add Committee Member</button>

<div class="container" id="committeeList"></div>


<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const list = document.getElementById("committeeList");

const snapshot = await getDocs(collection(db,"Committee"));

snapshot.forEach((doc)=>{

const data = doc.data();

const mobile = data.mobile || "";

list.innerHTML += `
<div class="card">

<img src="${data.photoUrl || 'logo.png'}"
onerror="this.src='logo.png'">

<div class="name">${data.name || ""}</div>

<div class="post">${data.post || ""}</div>

<div class="mobile">📞 ${mobile}</div>

<a href="tel:${mobile}">
<button>Call</button>
</a>

<a href="https://wa.me/${mobile}" target="_blank">
  <button style="background:#25D366;
                 color:white;
                 border:none;
                 padding:8px 18px;
                 border-radius:6px;
                 margin-left:8px;">
    WhatsApp
  </button>
</a>

</div>
`;

});
function adminLogin() {
    const pass = prompt("Admin Password ଦିଅନ୍ତୁ");

    if (pass === "12345") {
        window.location.href = "admin.html";
    } else {
        alert("Wrong Password!");
    }
}
</script>

</body>
</html>
