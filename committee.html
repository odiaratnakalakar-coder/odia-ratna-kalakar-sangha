<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Committee Members</title>

<style>
body{
    margin:0;
    background:#111;
    color:#fff;
    font-family:Arial,sans-serif;
    text-align:center;
}

h2{
    color:#ffb6c1;
    margin:25px 0;
}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card{
    width:280px;
    background:#2b2b2b;
    border:2px solid #c33;
    border-radius:15px;
    padding:20px;
}

.card img{
    width:140px;
    height:140px;
    border-radius:50%;
    border:3px solid #c33;
    object-fit:cover;
}

.name{
    font-size:28px;
    font-weight:bold;
    margin-top:15px;
}

.post{
    color:#ffb6c1;
    font-size:20px;
    margin:10px 0;
}

.mobile{
    margin:12px 0;
    font-size:18px;
}

button{
    padding:8px 18px;
    background:#b30000;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>

</head>
<body>

<h2>ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ<br>Committee Members</h2>
<h2>ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ<br>Committee Members</h2>

<button onclick="adminLogin()">➕ Add Committee Member</button>

<div class="container" id="committeeList"></div>
<div class="container" id="committeeList"></div>

<script type="module">

import { db } from "./firebase.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const list = document.getElementById("committeeList");

const snapshot = await getDocs(collection(db,"Committee"));

snapshot.forEach((doc)=>{

const data = doc.data();

const mobile = data.mobile || "";

list.innerHTML += `
<div class="card">

<img src="${data.photoUrl || 'logo.png'}"
onerror="this.src='logo.png'">

<div class="name">${data.name || ""}</div>

<div class="post">${data.post || ""}</div>

<div class="mobile">📞 ${mobile}</div>

<a href="tel:${mobile}">
<button>Call</button>
</a>

<a href="https://wa.me/${mobile}" target="_blank">
  <button style="background:#25D366;
                 color:white;
                 border:none;
                 padding:8px 18px;
                 border-radius:6px;
                 margin-left:8px;">
    WhatsApp
  </button>
</a>

</div>
`;

});

</script>

</body>
</html>
