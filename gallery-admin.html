<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery Admin</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

.container{
    max-width:500px;
    margin:auto;
    background:#222;
    padding:20px;
    border-radius:10px;
}

h2,h3{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#c40000;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.gallery-card{
    background:#222;
    border:2px solid red;
    border-radius:12px;
    padding:15px;
    margin-top:15px;
    text-align:center;
}

.gallery-card img{
    width:100%;
    max-height:220px;
    object-fit:cover;
    border-radius:10px;
}

.actionBtn{
    width:auto;
    padding:8px 15px;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Gallery Admin Panel</h2>

<input id="title" placeholder="Photo Title">

<input id="photoName" placeholder="Photo Name (ଉଦାହରଣ: photo2.jpg)">
<input id="photoName" placeholder="Photo Name (ଉଦାହରଣ: photo2.jpg)">

<input id="youtubeUrl" placeholder="YouTube Video Link (Optional)">

<button id="saveBtn">Save Photo</button>
<button id="saveBtn">Save Photo</button>

</div>

<h3>Gallery Photos</h3>

<div id="galleryList"></div>

<script>

const gallery = document.getElementById("gallery");

const photos = [
"photo1.jpg",
"photo2.jpg",
"photo4.jpg"
];

photos.forEach((file,index)=>{

gallery.innerHTML += `
<div class="card">

<img src="images/${file}"
onclick="showImage('images/${file}')">

<h3>Photo ${index+1}</h3>

</div>
`;

});

window.showImage=function(url){

document.getElementById("preview").style.display="flex";

document.getElementById("previewImg").src=url;

}

document.getElementById("preview").onclick=function(){

this.style.display="none";

}

</script>
