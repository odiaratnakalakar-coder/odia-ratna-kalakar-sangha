<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery Admin</title>

<style>
body{
margin:0;
padding:20px;
background:#111;
color:#fff;
font-family:Arial,sans-serif;
}

.container{
max-width:500px;
margin:auto;
background:#222;
padding:20px;
border-radius:12px;
}

h2,h3{
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:red;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

.gallery-card{
background:#222;
border:2px solid red;
border-radius:12px;
padding:10px;
margin-top:15px;
text-align:center;
}

.gallery-card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.deleteBtn{
background:#b00000;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>📷 Gallery Admin</h2>

<input id="title" placeholder="Photo Title">

<input id="photoName" placeholder="GitHub Photo Name (ଉଦାହରଣ: photo5.jpg)">

<input id="youtubeUrl" placeholder="YouTube Link (Optional)">

<button id="saveBtn">
Save
</button>

</div>

<h3>Gallery List</h3>

<div id="galleryList"></div>

<script type="module">
    import { db } from "./firebase.js";

import {
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const saveBtn = document.getElementById("saveBtn");
const galleryList = document.getElementById("galleryList");

async function loadGallery(){

galleryList.innerHTML = "";

const snapshot = await getDocs(collection(db,"Gallery"));

snapshot.forEach((photo)=>{

const data = photo.data();

galleryList.innerHTML += `
<div class="gallery-card">

<img src="${data.photoUrl}" onerror="this.src='logo.png'">

<h3>${data.title || "ଓଡ଼ିଆ ରତ୍ନ କଳାକାର ସଂଘ"}</h3>

<button class="deleteBtn"
onclick="deletePhoto('${photo.id}')">
🗑 Delete
</button>

</div>
`;

});

}
    saveBtn.onclick = async () => {

const title = document.getElementById("title").value.trim();
const photoName = document.getElementById("photoName").value.trim();
const youtubeUrl = document.getElementById("youtubeUrl").value.trim();

if (!title) {
    alert("Title ଲେଖନ୍ତୁ");
    return;
}

let photoUrl = "";

if (photoName) {
    photoUrl = `https://odiaratnakalakar-coder.github.io/odia-ratna-kalakar-sangha/images/${photoName}`;
}

await addDoc(collection(db, "Gallery"), {
    title,
    photoUrl,
    youtubeUrl
});

alert("Gallery Photo Saved Successfully");

document.getElementById("title").value = "";
document.getElementById("photoName").value = "";
document.getElementById("youtubeUrl").value = "";

loadGallery();

};

window.deletePhoto = async (id) => {

if (!confirm("Delete କରିବେ?")) return;

await deleteDoc(doc(db, "Gallery", id));

loadGallery();

};

loadGallery();

</script>

</body>
</html>
