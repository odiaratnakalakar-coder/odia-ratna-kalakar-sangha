<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery Admin</title>

<style>
body{
    margin:0;
    padding:20px;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

.container{
    max-width:500px;
    margin:auto;
    background:#222;
    padding:20px;
    border-radius:10px;
}

h2,h3{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#c40000;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.gallery-card{
    background:#222;
    border:2px solid red;
    border-radius:12px;
    padding:15px;
    margin-top:15px;
    text-align:center;
}

.gallery-card img{
    width:100%;
    max-height:220px;
    object-fit:cover;
    border-radius:10px;
}

.actionBtn{
    width:auto;
    padding:8px 15px;
    margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>Gallery Admin Panel</h2>

<input id="title" placeholder="Photo Title">

const photoUrl = document.getElementById("photoUrl").value.trim();

<button id="saveBtn">Save Photo</button>

</div>

<h3>Gallery Photos</h3>

<div id="galleryList"></div>

<script type="module">
  import { db } from "./firebase.js";

import {
collection,
addDoc,
getDocs,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const saveBtn = document.getElementById("saveBtn");
const galleryList = document.getElementById("galleryList");

async function loadGallery(){

galleryList.innerHTML = "";

const snapshot = await getDocs(collection(db,"Gallery"));

snapshot.forEach((photo)=>{

const data = photo.data();

galleryList.innerHTML += `

<div class="gallery-card">

<img src="${data.photoUrl}"
onerror="this.src='logo.png'">

<h3>${data.title}</h3>

<button class="actionBtn"
onclick="deletePhoto('${photo.id}')">
🗑 Delete
</button>

</div>

`;

});

}

saveBtn.addEventListener("click", async()=>{

const title = document.getElementById("title").value.trim();

const photoName = document.getElementById("photoName").value.trim();

const photoUrl =
"https://odiaratnakalakar-coder.github.io/odia-ratna-kalakar-sangha/images/" + photoName;

if(!title || !photoName){

alert("ସମସ୍ତ ତଥ୍ୟ ଭରନ୍ତୁ");

return;

}







await addDoc(collection(db,"Gallery"),{

title,
photoUrl

});

alert("Photo Saved Successfully");

document.getElementById("title").value = "";

document.getElementById("photoUrl").value = "";

loadGallery();

});
  window.deletePhoto = async function(id){

if(!confirm("ଏହି ଫଟୋକୁ Delete କରିବେ?")) return;

await deleteDoc(doc(db,"Gallery",id));

alert("Photo Deleted Successfully");

loadGallery();

}

loadGallery();

</script>

</body>
</html>
