<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>News Admin Panel</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#f2f2f2;
    font-family:Arial,sans-serif;
}

.container{
    max-width:700px;
    margin:auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    text-align:center;
    color:#8B0000;
}

input,
textarea{
    width:100%;
    padding:10px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

textarea{
    height:120px;
    resize:vertical;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:#8B0000;
    color:#fff;
    border:none;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#b30000;
}

#newsList{
    margin-top:25px;
}

.news-item{
    background:#fafafa;
    border-left:5px solid #8B0000;
    padding:15px;
    margin-bottom:15px;
    border-radius:6px;
}

.news-item img{
    width:100%;
    max-height:220px;
    object-fit:cover;
    border-radius:6px;
    margin-top:10px;
}

.editBtn{
    background:#0066cc;
    margin-top:10px;
}

.deleteBtn{
    background:#cc0000;
    margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>📰 News Admin Panel</h2>

<input type="text" id="title" placeholder="News Title">

<input type="text" id="date" placeholder="Date">

<input type="text" id="image" placeholder="Image URL (Optional)">

<textarea id="details" placeholder="News Details"></textarea>

<button id="saveBtn">
➕ Add News
</button>

<div id="newsList"></div>

<script type="module">
  import { db } from "./firebase.js";

import {
  collection,
  addDoc,
  getDocs,
  updateDoc,
  deleteDoc,
  doc,
  query,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const title = document.getElementById("title");
const date = document.getElementById("date");
const image = document.getElementById("image");
const details = document.getElementById("details");
const newsList = document.getElementById("newsList");
const saveBtn = document.getElementById("saveBtn");

let editId = null;

saveBtn.addEventListener("click", async () => {

  if(title.value.trim()==="" || details.value.trim()===""){
    alert("ଦୟାକରି Title ଓ Details ଲେଖନ୍ତୁ");
    return;
  }

  try{

    if(editId){

      await updateDoc(doc(db,"news",editId),{
        title:title.value,
        date:date.value,
        image:image.value,
        details:details.value
      });

      alert("✅ News Updated");

      editId=null;
      saveBtn.innerHTML="➕ Add News";

    }else{

      await addDoc(collection(db,"news"),{
        title:title.value,
        date:date.value,
        image:image.value,
        details:details.value,
        createdAt:serverTimestamp()
      });

      alert("✅ News Added");

    }

    title.value="";
    date.value="";
    image.value="";
    details.value="";

    loadNews();

  }catch(err){

    alert(err.message);

  }

});
  async function loadNews() {

  newsList.innerHTML = "";

  const q = query(collection(db,"news"), orderBy("createdAt","desc"));

  const snapshot = await getDocs(q);

  snapshot.forEach((d)=>{

    const news = d.data();

    const card = document.createElement("div");
    card.className = "news-item";

    card.innerHTML = `
      <h3>${news.title}</h3>
      <p><b>${news.date || ""}</b></p>

      ${news.image ? `<img src="${news.image}" alt="News">` : ""}

      <p>${news.details}</p>

      <button class="editBtn">✏️ Edit</button>

      <button class="deleteBtn">🗑️ Delete</button>
    `;

    // Edit Button
    card.querySelector(".editBtn").onclick = ()=>{

      editId = d.id;

      title.value = news.title || "";
      date.value = news.date || "";
      image.value = news.image || "";
      details.value = news.details || "";

      saveBtn.innerHTML = "💾 Update News";

      window.scrollTo({
        top:0,
        behavior:"smooth"
      });

    };

    // Delete Button
    card.querySelector(".deleteBtn").onclick = async ()=>{

      const password = prompt("🔒 Password ଦିଅନ୍ତୁ");

      if(password !== "2026@"){
        alert("❌ ଭୁଲ Password");
        return;
      }

      if(!confirm("News Delete କରିବେ?")) return;

      await deleteDoc(doc(db,"news",d.id));

      alert("✅ News Deleted");

      loadNews();

    };

    newsList.appendChild(card);

  });

  }
