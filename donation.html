<!DOCTYPE html>
<html lang="or">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donation</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
padding:15px;
}

.container{
max-width:500px;
margin:auto;
background:#222;
padding:20px;
border-radius:12px;
}

h2{
text-align:center;
color:#ff9800;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
background:#c40000;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#ff0000;
}

.card{
background:#333;
border:2px solid #ff9800;
border-radius:10px;
padding:15px;
margin-top:15px;
}

.card h3{
color:#ffcc00;
margin-bottom:8px;
}
</style>

</head>

<body>

<div class="container">

<h2>❤️ Donation Registration</h2>

<input type="text" id="name" placeholder="ଦାତାଙ୍କ ନାମ">

<input type="text" id="mobile" placeholder="ମୋବାଇଲ୍ ନମ୍ବର">

<input type="number" id="amount" placeholder="ଦାନ ରାଶି (₹)">

<textarea id="purpose" placeholder="ଦାନର ଉଦ୍ଦେଶ୍ୟ (ଇଚ୍ଛାଧୀନ)"></textarea>

<button id="saveBtn">❤️ Save Donation</button>

<hr style="margin:20px 0;">

<h2>📋 Donation List</h2>

<div id="donationList"></div>

</div>
<script type="module">

import { db } from "./firebase.js";

import {
collection,
addDoc,
getDocs,
orderBy,
query
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const saveBtn = document.getElementById("saveBtn");
const donationList = document.getElementById("donationList");

saveBtn.addEventListener("click", async ()=>{

const name = document.getElementById("name").value.trim();
const mobile = document.getElementById("mobile").value.trim();
const amount = document.getElementById("amount").value.trim();
const purpose = document.getElementById("purpose").value.trim();

if(!name || !mobile || !amount){
alert("ସମସ୍ତ ଆବଶ୍ୟକ ତଥ୍ୟ ଭରନ୍ତୁ");
return;
}

await addDoc(collection(db,"donations"),{
name,
mobile,
amount:Number(amount),
purpose,
createdAt:new Date()
});

alert("✅ Donation Saved Successfully");

document.getElementById("name").value="";
document.getElementById("mobile").value="";
document.getElementById("amount").value="";
document.getElementById("purpose").value="";

loadDonations();

});

async function loadDonations(){

donationList.innerHTML="";

const q = query(collection(db,"donations"), orderBy("createdAt","desc"));
const snapshot = await getDocs(q);

snapshot.forEach((doc)=>{

const data = doc.data();

donationList.innerHTML += `

<div class="card">

<h3>${data.name}</h3>

<p>📱 ${data.mobile}</p>

<p>💰 ₹${data.amount}</p>

<p>📝 ${data.purpose || "-"}</p>

</div>

`;

});

}

loadDonations();

</script>

</body>
</html>
